<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap');

  /* ── TOKENS ── */
  :root {
    --green-950: #0D2119;
    --green-900: #1A3D2B;
    --green-700: #2A6044;
    --green-400: #4CAF73;
    --green-100: #D0EDDB;
    --green-50:  #EEF8F2;
    --sand:      #F8F9F5;
    --surface:   #FFFFFF;
    --border:    #E4EAE6;
    --border-2:  #C8D4CB;
    --text:      #111815;
    --text-2:    #3D4F44;
    --muted:     #899690;
    --brown:     #7C4A1E;
    --brown-light: #F5EDE4;
    --error:     #DC2626;
    --success:   #16A34A;

    --radius-sm:  6px;
    --radius:     8px;
    --radius-md:  14px;
    --radius-lg:  20px;
    --radius-pill:40px;

    --shadow-hover: 0 8px 32px rgba(26,61,43,0.13);
    --shadow-modal: 0 24px 64px rgba(0,0,0,0.18);
    --shadow-card:  0 2px 8px rgba(0,0,0,0.06);

    --nav-h: 64px;
    --bar-h: 38px;
  }

  /* ── RESET ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--sand);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { text-decoration: none; color: inherit; }
  img { display: block; max-width: 100%; }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--green-50); }
  ::-webkit-scrollbar-thumb { background: var(--green-100); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--green-400); }

  /* ── TYPOGRAPHY ── */
  .serif { font-family: 'DM Serif Display', Georgia, serif; }
  h1,h2,h3 { font-family: 'DM Serif Display', Georgia, serif; line-height: 1.2; }
  h1 { font-size: clamp(38px, 5vw, 64px); }
  h2 { font-size: clamp(28px, 3.5vw, 42px); }
  h3 { font-size: clamp(20px, 2.5vw, 28px); }

  /* ── LAYOUT ── */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .section { padding: 80px 0; }
  .section-alt { background: var(--surface); }
  .page { display: none; }
  .page.active { display: block; }

  /* ── SECTION HEADERS ── */
  .section-label {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--green-400);
    margin-bottom: 10px;
  }
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(26px, 3vw, 38px);
    color: var(--text);
    margin-bottom: 8px;
  }
  .section-sub {
    font-size: 15px;
    color: var(--muted);
    max-width: 480px;
  }
  .section-header-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 36px;
    gap: 16px;
  }
  .section-header-row .header-left { flex: 1; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 22px;
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 14px;
    line-height: 1;
    border: 2px solid transparent;
    transition: background 0.18s, color 0.18s, border-color 0.18s, transform 0.15s;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--green-900);
    color: #fff;
    border-color: var(--green-900);
  }
  .btn-primary:hover { background: var(--green-700); border-color: var(--green-700); }
  .btn-outline {
    background: transparent;
    color: var(--green-900);
    border-color: var(--green-900);
  }
  .btn-outline:hover { background: var(--green-900); color: #fff; }
  .btn-ghost {
    background: transparent;
    color: var(--text-2);
    border-color: transparent;
  }
  .btn-ghost:hover { background: var(--green-50); color: var(--green-900); }
  .btn-white {
    background: #fff;
    color: var(--green-900);
    border-color: #fff;
  }
  .btn-white:hover { background: var(--green-50); }
  .btn-brown {
    background: var(--brown);
    color: #fff;
    border-color: var(--brown);
  }
  .btn-brown:hover { background: #6a3d18; border-color: #6a3d18; }
  .btn-sm { padding: 8px 16px; font-size: 13px; }
  .btn-lg { padding: 14px 28px; font-size: 16px; }
  .btn-full { width: 100%; }
  .btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* ── BADGES / TAGS ── */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: var(--radius-pill);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .badge-new { background: var(--green-100); color: var(--green-900); border: 1px solid var(--green-100); }
  .badge-best { background: #FEF3C7; color: #92400E; border: 1px solid #FDE68A; }
  .badge-out { background: #F3F4F6; color: #6B7280; border: 1px solid #E5E7EB; }
  .badge-delivered { background: var(--green-50); color: var(--success); border: 1px solid var(--green-100); }
  .badge-processing { background: #FEF9C3; color: #A16207; border: 1px solid #FEF08A; }
  .badge-pending { background: #FEF3C7; color: #92400E; border: 1px solid #FDE68A; }
  .badge-cancelled { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: var(--radius-pill);
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    background: var(--sand);
    border: 1px solid var(--border);
  }

  /* ── FORMS ── */
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
    margin-bottom: 6px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.18s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--green-900);
  }
  .form-group input::placeholder,
  .form-group textarea::placeholder { color: var(--muted); }
  .form-group textarea { resize: vertical; min-height: 96px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .form-error { font-size: 12px; color: var(--error); margin-top: 4px; display: none; }
  .form-error.show { display: block; }
  .input-success { border-color: var(--success) !important; }
  .input-error { border-color: var(--error) !important; }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    transition: box-shadow 0.2s, border-color 0.2s, transform 0.2s;
  }
  .card:hover {
    box-shadow: var(--shadow-hover);
    border-color: var(--border-2);
  }

  /* ── PRODUCT CARDS ── */
  .product-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .product-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-3px);
  }
  .product-img {
    height: 210px;
    background: var(--green-50);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    position: relative;
  }
  .product-img .badges {
    position: absolute;
    top: 12px;
    left: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .product-body { padding: 16px; }
  .product-cat {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--green-400);
    margin-bottom: 4px;
  }
  .product-name {
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.35;
  }
  .product-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
  .product-price { display: flex; align-items: baseline; gap: 8px; margin-bottom: 14px; }
  .product-price .price {
    font-size: 19px;
    font-weight: 800;
    color: var(--green-900);
  }
  .product-price .original {
    font-size: 13px;
    color: var(--muted);
    text-decoration: line-through;
  }
  .product-actions { display: flex; gap: 8px; }
  .product-actions .btn { flex: 1; font-size: 13px; padding: 9px 12px; }
  .out-of-stock .product-img::after {
    content: 'Out of Stock';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(17,24,21,0.65);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    padding: 7px;
    font-family: 'Inter', sans-serif;
  }
  .out-of-stock .btn-primary { background: var(--muted); border-color: var(--muted); pointer-events: none; }

  /* ── QTY STEPPER ── */
  .qty-stepper { display: inline-flex; align-items: center; gap: 10px; }
  .qty-btn {
    width: 32px; height: 32px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-sm);
    font-size: 18px;
    font-weight: 600;
    color: var(--text-2);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .qty-btn:hover { background: var(--green-50); border-color: var(--green-900); color: var(--green-900); }
  .qty-val { font-weight: 700; font-size: 15px; min-width: 24px; text-align: center; }

  /* ── DIVIDER ── */
  .divider { border: none; border-top: 1.5px solid var(--border); margin: 24px 0; }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 64px 20px; color: var(--muted); }
  .empty-state .empty-icon { font-size: 56px; margin-bottom: 16px; }
  .empty-state h3 { font-family: 'Inter', sans-serif; font-size: 18px; color: var(--text-2); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; margin-bottom: 24px; }

  /* ── OVERLAY ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 300;
    display: none;
    backdrop-filter: blur(2px);
  }
  .overlay.open { display: block; }

  /* ── SUCCESS STATE (forms) ── */
  .form-success {
    background: var(--green-50);
    border: 1.5px solid var(--green-100);
    border-radius: var(--radius-md);
    padding: 40px 32px;
    text-align: center;
    display: none;
  }
  .form-success.show { display: block; }
  .form-success .success-icon { font-size: 48px; margin-bottom: 14px; }
  .form-success h4 { font-size: 20px; font-family: 'DM Serif Display', serif; color: var(--green-900); margin-bottom: 8px; }
  .form-success p { color: var(--muted); font-size: 14px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .section { padding: 56px 0; }
    .form-row { grid-template-columns: 1fr; }
    .section-header-row { flex-direction: column; align-items: flex-start; gap: 12px; }
  }
  @media (max-width: 480px) {
    .container { padding: 0 16px; }
    h1 { font-size: 32px; }
  }
</style>
